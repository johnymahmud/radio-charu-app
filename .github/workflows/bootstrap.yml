name: Bootstrap Flutter Project

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create clean Flutter Android project
        run: |
          flutter create \
            --empty \
            --platforms=android \
            --org com.charu \
            --project-name radioapp \
            .

      - name: Commit generated project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Bootstrap clean Flutter project"
          git push