name: radioapp
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  webview_flutter: ^4.14.1
  http: ^1.6.0
  url_launcher: ^6.3.2
  app_settings: 7.0.0
  shared_preferences: ^2.5.5
  firebase_core: 4.11.0
  firebase_auth: 6.5.3
  cloud_firestore: 6.6.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "Assets/Icon/radio-charu.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - Assets/Icon/radio-charu.png
